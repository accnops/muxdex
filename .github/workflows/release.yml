name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package artifact
        run: |
          cp target/release/muxdex muxdex
          tar -czf muxdex-${{ matrix.target }}.tar.gz muxdex README.md
      - uses: actions/upload-artifact@v4
        with:
          name: muxdex-${{ matrix.target }}
          path: muxdex-${{ matrix.target }}.tar.gz

  publish:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Write checksums
        working-directory: dist
        run: sha256sum ./*.tar.gz > checksums.txt
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        working-directory: dist
        run: |
          gh release create "${GITHUB_REF_NAME}" ./*.tar.gz checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
